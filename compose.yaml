services:
  postgres:
    # PostGIS + pgvector. 기본 postgis 이미지엔 pgvector가 없어 별도 Dockerfile로 추가한다.
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    image: wswg-postgis-pgvector:16-3.4
    container_name: wswg-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wswg}
      POSTGRES_USER: ${POSTGRES_USER:-wswg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wswg}
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./src/main/resources/db/postgres/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wswg} -d ${POSTGRES_DB:-wswg}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wswg-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
