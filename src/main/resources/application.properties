spring.application.name=wswg

spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# 해당 패키지의 로그 레벨을 DEBUG로 설정해야 보입니다.
logging.level.com.ssafy.wswg=DEBUG


# 1. 데이터베이스 연결 설정 (DataSource)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/ssafy_trip?serverTimezone=Asia/Seoul&useSSL=false
spring.datasource.username=ssafy
spring.datasource.password=ssafy
mybatis.configuration.call-setters-on-nulls=true
mybatis.type-aliases-package=com.ssafy.wswg.*.dto

# 2. MyBatis 관련 설정
# XML 매퍼 파일들의 위치를 지정합니다 (폴더 구조에 맞게 변경하세요)
mybatis.mapper-locations=classpath:mapper/**/*.xml

# DB의 snake_case(si_gun_gu_code)를 Java의 camelCase(siGunGuCode)로 자동 매핑해 줍니다.
# 이 설정을 켜면 XML 매퍼에서 'AS 별칭'을 일일이 달아주지 않고 SELECT * 만 해도 매핑됩니다!
mybatis.configuration.map-underscore-to-camel-case=true