spring:
  security:
    oauth2:
      client:
        registration:
          google :
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: profile, email
          kakao :
            client-id: ${KAKAO_CLIENT_ID}
            client-name: "kakao"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            scope:
              - profile_nickname,
              - account_email

        # 카카오의 실제 API 주소들을 등록하는 곳
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            # 카카오는 유저의 고유 식별자 키가 응답 바디의 최상단 'id'라는 이름으로 옵니다.
            user-name-attribute: id
  application:
    name: wswg

  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp

  # 1. 데이터베이스 연결 설정 (DataSource)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ssafy_trip?serverTimezone=Asia/Seoul&useSSL=false
    username: ssafy
    password: ssafy

  data:
    redis:
      host: localhost
      port: 6379

# 해당 패키지의 로그 레벨을 DEBUG로 설정해야 보입니다.
logging:
  level:
    com.ssafy.wswg: DEBUG

# 2. MyBatis 관련 설정
mybatis:
  type-aliases-package: com.ssafy.wswg.*.dto
  # XML 매퍼 파일들의 위치를 지정합니다 (폴더 구조에 맞게 변경하세요)
  mapper-locations: classpath:mapper/**/*.xml

  configuration:
    call-setters-on-nulls: true
    # DB의 snake_case(si_gun_gu_code)를 Java의 camelCase(siGunGuCode)로 자동 매핑해 줍니다.
    # 이 설정을 켜면 XML 매퍼에서 'AS 별칭'을 일일이 달아주지 않고 SELECT * 만 해도 매핑됩니다!
    map-underscore-to-camel-case: true

