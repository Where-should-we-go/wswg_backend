spring:
  config:
    import: optional:file:.env[.properties]

  security:
    oauth2:
      client:
        registration:
          google :
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: profile, email
          kakao :
            client-id: ${KAKAO_CLIENT_ID}
            client-name: "kakao"
            authorization-grant-type: authorization_code
            client-authentication-method: none
            # 기본은 요청 baseUrl 기반. LAN/핫스팟 데모처럼 프록시 뒤라 baseUrl이 틀어질 땐
            # KAKAO_REDIRECT_URI 로 고정(카카오 콘솔에 등록한 값과 정확히 일치시킬 것).
            redirect-uri: "${KAKAO_REDIRECT_URI:{baseUrl}/login/oauth2/code/kakao}"
            scope:
              - profile_nickname
              - account_email

        # 카카오의 실제 API 주소들을 등록하는 곳
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            # 카카오는 유저의 고유 식별자 키가 응답 바디의 최상단 'id'라는 이름으로 옵니다.
            user-name-attribute: id
  application:
    name: wswg

  # 미디어 업로드 한도 — 기본 1MB 는 사진도 못 올림. 파일당 20MB / 요청 25MB.
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp

  # 1. 데이터베이스 연결 설정 (DataSource)
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:55432/wswg}
    username: ${POSTGRES_USER:wswg}
    password: ${POSTGRES_PASSWORD:wswg}

  data:
    redis:
      host: localhost
      port: 6379

# 해당 패키지의 로그 레벨을 DEBUG로 설정해야 보입니다.
logging:
  level:
    com.ssafy.wswg: DEBUG

# 2. MyBatis 관련 설정
mybatis:
  type-aliases-package: com.ssafy.wswg.*.dto
  # XML 매퍼 파일들의 위치를 지정합니다 (폴더 구조에 맞게 변경하세요)
  mapper-locations: classpath:mapper/**/*.xml

  configuration:
    call-setters-on-nulls: true
    # DB의 snake_case(si_gun_gu_code)를 Java의 camelCase(siGunGuCode)로 자동 매핑해 줍니다.
    # 이 설정을 켜면 XML 매퍼에서 'AS 별칭'을 일일이 달아주지 않고 SELECT * 만 해도 매핑됩니다!
    map-underscore-to-camel-case: true

# OAuth 로그인 후 되돌려보낼 프론트엔드 origin 화이트리스트(콤마 구분).
# LAN의 다른 PC에서 접속하려면 그 PC가 쓰는 주소를 추가: 예) http://localhost:3000,http://192.168.0.5:3000
app:
  frontend:
    allowed-origins: ${FRONTEND_ALLOWED_ORIGINS:http://localhost:3000}

# jwt
jwt:
  secret: ${JWT_SECRET}
  #20분
  expiration: 1200000
  #14일
  refresh-expiration: 1209600000

# TourAPI (data.go.kr KorService2) 적재 배치용 설정
tour-api:
  base-url: http://apis.data.go.kr/B551011/KorService2
  service-key: ${TOUR_API_KEY}
  mobile-app: wswg
  num-of-rows: 1000
  schedule-cron: "0 0 4 * * MON"
  # 타임아웃/재시도는 TourApiProperties 기본값 사용 (필요 시 여기서 override)
  # connect-timeout-ms: 5000
  # read-timeout-ms: 10000
  # retry-max-attempts: 3
  # retry-backoff-ms: 1000

openai:
  api-key: ${OPENAI_API_KEY:}                 # 값으로 GMS Key를 주입
  chat-model: gpt-4o-mini
  chat-url: https://gms.ssafy.io/gmsapi/api.openai.com/v1/chat/completions
  embedding-model: text-embedding-3-small
  embedding-url: https://gms.ssafy.io/gmsapi/api.openai.com/v1/embeddings

oci:
  object-storage:
    region: ${OCI_REGION:}
    namespace: ${OCI_NAMESPACE:}
    bucket: ${OCI_BUCKET:}
    public-base-url: ${OCI_PUBLIC_BASE_URL:}
    tenancy-ocid: ${OCI_TENANCY_OCID:}
    user-ocid: ${OCI_USER_OCID:}
    fingerprint: ${OCI_FINGERPRINT:}
    private-key-path: ${OCI_PRIVATE_KEY_PATH:}
